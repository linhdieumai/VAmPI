name: pipeline week 7-8

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ['master']

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # bước 1: lấy thông tin
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Quan trọng: SonarQube cần cái này để phân tích lịch sử

    # bước 2: thiết lập môi trường python & node
    - uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - uses: actions/setup-node@v3
      with:
        node-version: '18'

    # bước 3: SAST với semgrep
    - name: Install Semgrep
      run: pip install semgrep

    - name: Semgrep Scan
      run: semgrep scan --config auto --error
      env:
        MY_APP_SECRET_KEY: "${{ secrets.MY_APP_SECRET_KEY }}"

    # bước 4: SAST với SonarQube
    - name: SonarQube Scan
      uses: sonarsource/sonarqube-scan-action@master
      with:
        args: >
          -Dsonar.projectKey=linhdieumai_VAmPI
          -Dsonar.organization=linhdieumai
          -Dsonar.exclusions=.github/**
          -Dsonar.coverage.exclusions=**/*.py
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: https://sonarcloud.io
    # bước 4.1: quality gate check của sonar
    - name: SonarQube Quality Gate Check
      uses: sonarsource/sonarqube-quality-gate-action@master
      timeout-minutes: 5
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        scanMetadataReportFile: .sonar/report-task.txt
    # bước 4.2: Chốt chặn an toàn kiểm tra tổng số lỗi High/Critical còn sót lại
    - name: Hard-Blocking Deployment Safety Gate
      run: |
        # Đọc file report do bước 4.1 sinh ra để lấy ID đợt phân tích
        TASK_URL=$(grep "ceTaskUrl" .sonar/report-task.txt | cut -d= -f2)
        echo "Verifying server-side analysis task metrics from: $TASK_URL"
          
        # Gọi API SonarCloud đếm số lỗi thực tế còn Open ở Overall Code
        RESPONSE=$(curl -s -u "${{ secrets.SONAR_TOKEN }}:" \
         "https://sonarcloud.io/api/issues/search?componentKeys=YOUR_PROJECT_KEY&severities=CRITICAL,HIGH&resolved=false")
        TOTAL_ISSUES=$(echo $RESPONSE | jq '.total')
          
        echo "Security Audit: Found $TOTAL_ISSUES active High/Critical flaws in the repository."
          
        if [ "$TOTAL_ISSUES" -gt 0 ]; then
          echo "::error::[QUALITY GATE FAILED] Deployment blocked! Found $TOTAL_ISSUES unpatched High/Critical bugs."
          exit 1
        fi
    # bước 5: SCA với Snyk
    - name: Install Project Dependencies
      run: pip install -r requirements.txt # Cài đặt các thư viện của dự án để Snyk có thể phân tích

    - name: Install Snyk CLI
      run: npm install -g snyk

    - name: Snyk SCA Test
      run: |
        snyk ignore --id=SNYK-PYTHON-WERKZEUG-6808933 --reason="Không thể nâng cấp do xung đột với thư viện connexion"
        snyk test --severity-threshold=high
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    # Bước 6: Khởi động ứng dụng VAmPI ở chế độ chạy ngầm (Background)
    # Bước 6: Khởi động ứng dụng VAmPI ở chế độ chạy ngầm
    - name: Start VAmPI App
      run: |
        nohup python app.py > app.log 2>&1 &
        sleep 10
        
        # Kiểm tra xem cổng 5000 có đang mở không
        if curl -s http://127.0.0.1:5000/ > /dev/null; then
          echo "Server Flask đã khởi động thành công!"
        else
          echo "Server Flask đã SẬP! Dưới đây là nguyên nhân (app.log):"
          cat app.log
          exit 1 # Đánh fail ngay lập tức, không cần chạy ZAP nữa để tiết kiệm thời gian
        fi
    # Bước 7: DAST với OWASP ZAP
    - name: OWASP ZAP Baseline Scan
      uses: zaproxy/action-baseline@v0.12.0
      with:
        target: 'http://127.0.0.1:5000/' # Mục tiêu ZAP sẽ nhắm vào để quét
        rules_file_name: '.zap/rules.tsv' # Thêm dòng này
        # Cấu hình Quality Gate cho ZAP (báo đỏ nếu có lỗi)
        fail_action: true
